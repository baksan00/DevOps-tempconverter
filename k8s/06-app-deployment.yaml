apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempconverter
  namespace: tempconverter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempconverter
  template:
    metadata:
      labels:
        app: tempconverter
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: tempconverter
              topologyKey: kubernetes.io/hostname
      containers:
        - name: tempconverter
          image: docker.io/baksan00/tempconverter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: STUDENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STUDENT
            - name: COLLEGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: COLLEGE
