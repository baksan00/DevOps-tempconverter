version: "3.8"

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tempnet
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  app:
    image: ${REGISTRY_IMAGE}:latest
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      STUDENT: ${STUDENT_NAME}
      COLLEGE: ${COLLEGE_NAME}
    ports:
      - target: 5000
        published: 80
        protocol: tcp
        mode: ingress
    networks:
      - tempnet
    deploy:
      replicas: 2
      placement:
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure

networks:
  tempnet:
    driver: overlay

volumes:
  db_data:
